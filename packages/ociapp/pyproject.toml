[project]
name = "ociapp"
version = "0.1.0"
description = "Sandbox-side OCIApp SDK and UDS server"
readme = "README.md"
license = "BSD-3-Clause-Clear"
requires-python = ">=3.14"
dependencies = [
    "msgpack>=1.1.1",
    "pydantic>=2.11.9",
]

[project.scripts]
ociapp = "ociapp.cli:main"

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"
